{{- if and (eq "" .Values.deployment.serviceAccount.existingServiceAccount) (eq "" .Values.mgmtGateway.existingServiceAccount)}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mgmtGateway.serviceAccount" . }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.deployment.serviceAccount.labels }}
  labels:
  {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.deployment.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mgmt-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: mgmt-gateway
    {{- if .Values.mgmtGateway.applicationLabels }}
    {{- .Values.mgmtGateway.applicationLabels | toYaml | nindent 4 }}
    {{- end }}
  {{- if .Values.mgmtGateway.applicationAnnotations }}
  annotations:
    {{- .Values.mgmtGateway.applicationAnnotations | toYaml | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mgmt-gateway
  template:
    metadata:
      labels:
        app: mgmt-gateway
        {{- if .Values.mgmtGateway.podTemplateLabels }}
        {{- .Values.mgmtGateway.podTemplateLabels | toYaml | nindent 8 }}
        {{- end }}
      annotations:
        "cluster-autoscaler.kubernetes.io/safe-to-evict": "false"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/q/metrics"
        checksum/opthub.properties: {{ (include "opthub.properties.content" .) | sha256sum }}
        {{- if .Values.mgmtGateway.podTemplateAnnotations }}
        {{- .Values.mgmtGateway.podTemplateAnnotations | toYaml | nindent 8 }}
        {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 1001
      {{- if .Values.mgmtGateway.spec }}
      {{- .Values.mgmtGateway.spec | toYaml | nindent 6 }}
      {{- end }}
      containers:
        - name: mgmt-gateway
          image: {{ .Values.registry.opthub }}/opthub-mgmt-gateway:{{ default .Chart.AppVersion .Values.appVersionOverride }}{{ default .Values.versionSuffix .Values.mgmtGateway.versionSuffix }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - all
          {{- if .Values.mgmtGateway.command }}
          command: {{- .Values.mgmtGateway.command | toYaml | nindent 10 }}
          {{- end }}
          env:
{{- if and (eq "s3" .Values.storage.blobStorageService) .Values.secrets.blobStorage.s3.secretkey .Values.secrets.blobStorage.s3.accesskey }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "blobStorage.s3.secretName" . }}
                  key: {{ .Values.secrets.blobStorage.s3.accessKeySecretKey }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "blobStorage.s3.secretName" . }}
                  key: {{ .Values.secrets.blobStorage.s3.secretAccessKeySecretKey }}
{{- end }}
{{- if and (eq "azure-blob" .Values.storage.blobStorageService) (eq "sas-token" .Values.storage.azureBlob.authMethod) .Values.secrets.blobStorage.azure.sasToken }}
            - name: BLOB_STORAGE_AZURE_BLOB_SASTOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure.storage.secretName" . }}
                  key: {{ .Values.secrets.blobStorage.azure.sasTokenSecretKey }}
{{- end }}
{{- if and (eq "azure-blob" .Values.storage.blobStorageService) (eq "connection-string" .Values.storage.azureBlob.authMethod) .Values.secrets.blobStorage.azure.connectionString }}
            - name: BLOB_STORAGE_AZURE_BLOB_CONNECTIONSTRING
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure.storage.secretName" . }}
                  key: {{ .Values.secrets.blobStorage.azure.connectionStringSecretKey }}
{{- end }}
          args:
            - "-XX:+ExitOnOutOfMemoryError"
            - "-XX:MaxRAMPercentage=60"
{{- if .Values.mgmtGateway.extraArguments }}
    {{- .Values.mgmtGateway.extraArguments | toYaml | nindent 12 }}
{{- end }}
{{- if .Values.mgmtGateway.extraArgumentsMap }}
    {{- range $key, $val := .Values.mgmtGateway.extraArgumentsMap }}
            - -D{{ $key }}={{ $val }}
    {{- end }}
{{- end }}
          ports:
            - containerPort: 8080
              name: http-endpoint
{{- if .Values.mgmtGateway.resources }}
          resources: {{- .Values.mgmtGateway.resources | toYaml | nindent 12 }}
{{- end }}
{{- if ne true .Values.mgmtGateway.disableKubernetesProbes }}
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: http-endpoint
            initialDelaySeconds: 0
            timeoutSeconds: 1
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: http-endpoint
            initialDelaySeconds: 0
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /q/health/started
              port: http-endpoint
            initialDelaySeconds: 0
            timeoutSeconds: 1
            periodSeconds: 5
            failureThreshold: 18
{{- end }}
          volumeMounts:
            - name: config
              mountPath: "/etc/opthub"
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: quarkus-config
            items:
              - key: "opthub.properties"
                path: "opthub.properties"
        - name: tmp-volume
          emptyDir:
{{- if (((.Values.mgmtGateway).resources).limits) }}
            sizeLimit: {{ get .Values.mgmtGateway.resources.limits "ephemeral-storage" }}
{{- end }}
      serviceAccountName: {{ include "mgmtGateway.serviceAccount" . }}
{{- if eq true .Values.mgmtGateway.azureVirtualNodes }}
      nodeSelector:
        kubernetes.io/role: agent
        kubernetes.io/os: linux
        type: virtual-kubelet
{{- else if .Values.mgmtGateway.nodeSelector }}
      nodeSelector: {{- .Values.mgmtGateway.nodeSelector | toYaml | nindent 8 }}
{{- end }}
{{- if eq true .Values.mgmtGateway.azureVirtualNodes }}
      tolerations:
        - key: virtual-kubelet.io/provider
          operator: Exists
        - key: azure.com/aci
          effect: NoSchedule
{{- else if .Values.mgmtGateway.tolerations }}
      tolerations: {{- .Values.mgmtGateway.tolerations | toYaml | nindent 8 }}
{{- end }}
{{- if .Values.mgmtGateway.affinity }}
      affinity: {{- .Values.mgmtGateway.affinity | toYaml | nindent 8 }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: mgmt-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: mgmt-gateway
    {{- if .Values.mgmtGateway.serviceLabels }}
    {{- .Values.mgmtGateway.serviceLabels | toYaml | nindent 4 }}
    {{- end }}
{{- if .Values.mgmtGateway.service.annotations }}
  annotations: {{- .Values.mgmtGateway.service.annotations | toYaml | nindent 4 }}
{{- end }}
spec:
  type: {{ .Values.mgmtGateway.service.type }}
  ports:
    - port: {{ .Values.mgmtGateway.service.httpEndpoint.port }}
      protocol: TCP
      name: http-server
      targetPort: 8080
  selector:
    app: mgmt-gateway
