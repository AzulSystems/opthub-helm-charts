{{- if and .Values.operator .Values.operator.enabled}}

{{- if and (eq "" .Values.deployment.serviceAccount.existingServiceAccount) (eq "" .Values.operator.existingServiceAccount)}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "operator.serviceAccount" . }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.deployment.serviceAccount.labels }}
  labels:
  {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.deployment.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opthub-operator-role
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups:
      - apps
    resources:
      - deployments/scale
      - deployments
      - statefulsets/scale
      - statefulsets
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
      - "metrics.k8s.io"
    resources:
      - pods
    verbs:
      - get
      - list
      - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opthub-operator-role-binding
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: opthub-operator-role
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: {{ include "operator.serviceAccount" . }}
    namespace: {{ .Release.Namespace }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator
  namespace: {{ .Release.Namespace }}
  labels:
    app: operator
    {{- if .Values.operator.applicationLabels }}
    {{- .Values.operator.applicationLabels | toYaml | nindent 4 }}
    {{- end }}
  {{- if .Values.operator.applicationAnnotations }}
  annotations:
    {{- .Values.operator.applicationAnnotations | toYaml | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: operator
  template:
    metadata:
      labels:
        app: operator
        {{- if .Values.operator.podTemplateLabels }}
        {{- .Values.operator.podTemplateLabels | toYaml | nindent 8 }}
        {{- end }}
      annotations:
        "cluster-autoscaler.kubernetes.io/safe-to-evict": "false"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/q/metrics"
        checksum/opthub.properties: {{ (include "opthub.properties.content" .) | sha256sum }}
        {{- if .Values.operator.podTemplateAnnotations }}
        {{- .Values.operator.podTemplateAnnotations | toYaml | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.operator.spec }}
      {{- .Values.operator.spec | toYaml | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 1001
      containers:
        - name: operator
          image: {{ .Values.registry.opthub }}/opthub-operator:{{ default .Chart.AppVersion .Values.appVersionOverride }}{{ default .Values.versionSuffix .Values.operator.versionSuffix }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - all
          {{- if .Values.operator.command }}
          command: {{- .Values.operator.command | toYaml | nindent 10 }}
          {{- end }}
          args:
            - -XX:+ExitOnOutOfMemoryError
            - -XX:MaxRAMPercentage=60
{{- if .Values.operator.extraArguments }}
  {{- .Values.operator.extraArguments | toYaml | nindent 12 }}
{{- end }}
{{- if .Values.operator.extraArgumentsMap }}
    {{- range $key, $val := .Values.operator.extraArgumentsMap }}
            - -D{{ $key }}={{ $val }}
    {{- end }}
{{- end }}
          ports:
            - containerPort: 8080
              name: http-endpoint
          {{- if .Values.operator.resources }}
          resources: {{- .Values.operator.resources | toYaml | nindent 12 }}
          {{- end }}
          {{- if ne true .Values.operator.disableKubernetesProbes }}
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: http-endpoint
            initialDelaySeconds: 0
            timeoutSeconds: 1
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: http-endpoint
            initialDelaySeconds: 0
            timeoutSeconds: 1
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /q/health/started
              port: http-endpoint
            initialDelaySeconds: 0
            timeoutSeconds: 1
            periodSeconds: 5
            failureThreshold: 10
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: "/etc/opthub"
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: quarkus-config
            items:
              - key: "opthub.properties"
                path: "opthub.properties"
        - name: tmp-volume
          emptyDir:
{{- if (((.Values.operator).resources).limits) }}
            sizeLimit: {{ get .Values.operator.resources.limits "ephemeral-storage" }}
{{- end }}
      serviceAccountName: {{ include "operator.serviceAccount" . }}
{{- if eq true .Values.operator.azureVirtualNodes }}
      nodeSelector:
        kubernetes.io/role: agent
        kubernetes.io/os: linux
        type: virtual-kubelet
{{- else if .Values.operator.nodeSelector }}
      nodeSelector: {{- .Values.operator.nodeSelector | toYaml | nindent 8 }}
{{- end }}
{{- if eq true .Values.operator.azureVirtualNodes }}
      tolerations:
        - key: virtual-kubelet.io/provider
          operator: Exists
        - key: azure.com/aci
          effect: NoSchedule
{{- else if .Values.operator.tolerations }}
      tolerations: {{- .Values.operator.tolerations | toYaml | nindent 8 }}
{{- end }}
{{- if .Values.operator.affinity }}
      affinity: {{- .Values.operator.affinity | toYaml | nindent 8 }}
{{- end }}
{{- end }}
